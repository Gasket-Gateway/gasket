# Gasket Gateway Configuration
# See docs/docs/requirements.md for full spec

server:
  host: "0.0.0.0"
  port: 5000
  metrics_port: 9050
  debug: false

# Default UI theme: "light" or "dark"
default_theme: "dark"

# Portal banners — position controls where the banner appears
# Options: above_navbar, below_navbar, footer, permanent_footer
banners: []
  # - type: info
  #   content: "ℹ️ Welcome to the <b>Gasket Gateway</b> development environment."
  #   position: above_navbar
  # - type: warning
  #   content: "⚠️ This is an example banner that will hide when scrolling."
  #   position: below_navbar
  # - type: info
  #   content: "Made with ❤️ by <b>Gasket</b> project team."
  #   position: permanent_footer
  # - type: warning
  #   content: "⚠️ This is an example footer."
  #   position: footer

# OIDC Authentication
oidc:
  provider_url: "https://authentik.gasket-dev.local/application/o/gasket-gateway/"
  client_id: "gg-client-id"
  client_secret: "gg-client-secret"
  # Set to true to skip TLS verification for the OIDC provider
  skip_tls_verify: true
  session_timeout_hours: 8
  # External callback URL registered with the OIDC provider
  redirect_url: "https://portal.gasket-dev.local/auth/callback"
  logout_url: "https://authentik.gasket-dev.local/application/o/gasket-gateway/end-session/"
  groups:
    user_access: "gasket-users"
    admin_access: "gasket-admins"

# PostgreSQL
database:
  host: "postgres"
  port: 5432
  name: "gasket"
  user: "gasket"
  password: "gasket-dev-password"

# OpenSearch
opensearch:
  url: "https://opensearch.gasket-dev.local"
  skip_tls_verify: false

# OpenAI-compliant backends (config-defined — read-only in admin panel)
# These are automatically synced to the database on startup.
openai_backends:
  - name: "ollama-internal"
    base_url: "https://ollama-internal.gasket-dev.local"
    api_key: ""
    skip_tls_verify: true

# Backend Profiles (placeholder)
backend_profiles: []
