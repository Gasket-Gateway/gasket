# Alembic configuration for Gasket Gateway
# Database URL is resolved at runtime from GASKET_CONFIG

[alembic]
script_location = %(here)s/migrations
# Placeholder — overridden by env.py from Gasket config
sqlalchemy.url =

[loggers]
keys = root,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
