# Gasket Gateway — Development (single instance, Flask dev server)
services:
  postgres:
    image: postgres:16-alpine
    container_name: gasket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gasket
      POSTGRES_USER: gasket
      POSTGRES_PASSWORD: gasket-dev-password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  gasket:
    build: .
    image: gasket:dev
    container_name: gasket-dev
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "5000:5000"
      - "9050:9050"
    volumes:
      - ./config.yaml:/etc/gasket/config.yaml:ro
      - ./app:/app/app:ro
    environment:
      GASKET_INSTANCE: "1"
      FLASK_DEBUG: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "portal.gasket-dev.local:host-gateway"
      - "traefik.gasket-dev.local:host-gateway"
      - "authentik.gasket-dev.local:host-gateway"
      - "opensearch.gasket-dev.local:host-gateway"
      - "opensearch-dashboard.gasket-dev.local:host-gateway"
      - "prometheus.gasket-dev.local:host-gateway"
      - "grafana.gasket-dev.local:host-gateway"
      - "open-webui.gasket-dev.local:host-gateway"
      - "ollama-external.gasket-dev.local:host-gateway"
      - "ollama-internal.gasket-dev.local:host-gateway"
      - "traefik-metrics.gasket-dev.local:host-gateway"
      - "authentik-metrics.gasket-dev.local:host-gateway"
      - "api.gasket-dev.local:host-gateway"
      - "metrics.gasket-dev.local:host-gateway"
    command: ["python", "-m", "app.main"]

volumes:
  pgdata:
    driver: local
